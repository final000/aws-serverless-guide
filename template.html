<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE_EN}} — {{SITE_TITLE_EN}}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
  <style>
    :root {
      --sidebar-width: 260px;
      --color-bg: #ffffff;
      --color-sidebar: #f8f9fa;
      --color-border: #e2e6ea;
      --color-text: #1a1a2e;
      --color-text-muted: #5a6270;
      --color-primary: #0073bb;
      --color-primary-hover: #005a94;
      --color-code-bg: #f4f6f8;
      --color-blockquote-bg: #eef6fc;
      --color-blockquote-border: #0073bb;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: var(--color-text);
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--color-sidebar);
      border-right: 1px solid var(--color-border);
      padding: 1.5rem 0;
      position: fixed;
      top: 0; left: 0;
      height: 100vh;
      overflow-y: auto;
      z-index: 100;
    }

    .sidebar-header {
      padding: 0 1.25rem 1rem;
      border-bottom: 1px solid var(--color-border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--color-text);
      text-decoration: none;
    }

    /* Language toggle */
    .lang-toggle {
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .lang-toggle:hover { background: var(--color-primary-hover); }

    /* Language content switching */
    .lang-content { display: none; }
    .lang-content.active { display: block; }
    .lang-text { display: none; }
    .lang-text.active { display: inline; }

    .sidebar-nav { padding: 0.75rem 0; display: flex; flex-direction: column; }

    .sidebar-nav a {
      display: block;
      padding: 0.5rem 1.25rem;
      color: var(--color-text-muted);
      text-decoration: none;
      font-size: 0.925rem;
      border-left: 3px solid transparent;
      transition: all 0.15s ease;
    }

    .sidebar-nav a:hover { color: var(--color-primary); background: rgba(0, 115, 187, 0.04); }
    .sidebar-nav a.active {
      color: var(--color-primary);
      border-left-color: var(--color-primary);
      background: rgba(0, 115, 187, 0.06);
      font-weight: 600;
    }

    /* Main content */
    .content {
      margin-left: var(--sidebar-width);
      flex: 1;
      padding: 2.5rem 3rem;
      max-width: 900px;
    }

    .article h1 { font-size: 2rem; margin-bottom: 1rem; color: var(--color-text); }
    .article h2 { font-size: 1.4rem; margin: 2rem 0 0.75rem; padding-bottom: 0.3rem; border-bottom: 1px solid var(--color-border); }
    .article h3 { font-size: 1.15rem; margin: 1.5rem 0 0.5rem; }
    .article p { margin-bottom: 1rem; }
    .article ul, .article ol { margin: 0 0 1rem 1.5rem; }
    .article li { margin-bottom: 0.35rem; }

    .article a { color: var(--color-primary); text-decoration: none; }
    .article a:hover { text-decoration: underline; }

    .article code {
      background: var(--color-code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.9em;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, Consolas, monospace;
    }

    .article pre {
      background: var(--color-code-bg);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }

    .article pre code { background: none; padding: 0; font-size: 0.875rem; }

    .article blockquote {
      background: var(--color-blockquote-bg);
      border-left: 4px solid var(--color-blockquote-border);
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      border-radius: 0 6px 6px 0;
    }

    .article blockquote p { margin-bottom: 0; }

    .article table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1.25rem;
    }

    .article th, .article td {
      text-align: left;
      padding: 0.6rem 1rem;
      border: 1px solid var(--color-border);
    }

    .article th { background: var(--color-sidebar); font-weight: 600; }

    /* Copy button */
    .copy-btn {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      padding: 0.2rem 0.6rem;
      font-size: 0.75rem;
      cursor: pointer;
      color: var(--color-text-muted);
      opacity: 0;
      transition: opacity 0.15s;
    }

    pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--color-primary); border-color: var(--color-primary); }

    /* Mobile toggle */
    .menu-toggle {
      display: none;
      position: fixed;
      top: 0.75rem;
      left: 0.75rem;
      z-index: 200;
      background: var(--color-bg);
      border: 1px solid var(--color-border);
      border-radius: 6px;
      padding: 0.4rem 0.7rem;
      font-size: 1.25rem;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); transition: transform 0.25s ease; }
      .sidebar.open { transform: translateX(0); box-shadow: 2px 0 12px rgba(0,0,0,0.1); }
      .menu-toggle { display: block; }
      .content { margin-left: 0; padding: 3.5rem 1.25rem 2rem; }
    }
  </style>
</head>
<body>
  <nav class="sidebar" id="sidebar" aria-label="Main navigation">
    <div class="sidebar-header">
      <a href="index.html" class="logo">&#9889; Serverless Guide</a>
      <button class="lang-toggle" id="langToggle" aria-label="Switch language">TH</button>
    </div>
    <div class="sidebar-nav">
      {{NAVIGATION}}
    </div>
  </nav>

  <button class="menu-toggle" id="menuToggle" aria-label="Toggle navigation">&#9776;</button>

  <main class="content">
    <article class="article">
      {{CONTENT}}
    </article>
  </main>
  <script>
    // Language switching
    const LANG_KEY = 'serverless-guide-lang';
    const langs = ['en', 'th'];
    const langLabels = { en: 'TH', th: 'EN' }; // button shows the OTHER language
    const titleEN = '{{PAGE_TITLE_EN}} — {{SITE_TITLE_EN}}';
    const titleTH = '{{PAGE_TITLE_TH}} — {{SITE_TITLE_TH}}';

    function setLanguage(lang) {
      localStorage.setItem(LANG_KEY, lang);
      document.documentElement.lang = lang === 'th' ? 'th' : 'en';
      document.title = lang === 'th' ? titleTH : titleEN;

      // Toggle content
      document.querySelectorAll('.lang-content').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === lang);
      });

      // Toggle nav labels
      document.querySelectorAll('.lang-text').forEach(el => {
        el.classList.toggle('active', el.dataset.lang === lang);
      });

      // Update toggle button
      document.getElementById('langToggle').textContent = langLabels[lang];

      // Re-add copy buttons for newly visible code blocks
      addCopyButtons();
    }

    // Toggle button
    const toggleBtn = document.getElementById('langToggle');
    toggleBtn.addEventListener('click', () => {
      const current = localStorage.getItem(LANG_KEY) || 'en';
      setLanguage(current === 'en' ? 'th' : 'en');
    });

    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const sidebar = document.getElementById('sidebar');
    menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

    // Copy buttons for code blocks
    function addCopyButtons() {
      document.querySelectorAll('.copy-btn').forEach(b => b.remove());
      document.querySelectorAll('.lang-content.active pre code').forEach(block => {
        const btn = document.createElement('button');
        btn.className = 'copy-btn';
        btn.textContent = 'Copy';
        btn.setAttribute('aria-label', 'Copy code to clipboard');
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(block.textContent).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 2000);
          });
        });
        block.parentElement.style.position = 'relative';
        block.parentElement.appendChild(btn);
      });
    }

    // Initialize
    setLanguage(localStorage.getItem(LANG_KEY) || 'en');
  </script>
</body>
</html>
